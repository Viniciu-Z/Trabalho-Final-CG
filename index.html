<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Passeio Virtual 3D</title>

<!-- Vertex Shader -->
<script id="vertex-shader" type="notjs">

attribute vec3 position;
attribute vec4 color;

uniform mat4 transf;

varying vec4 v_color;

void main()
{
    v_color = color;

    gl_Position =
        transf *
        vec4(position, 1.0);
}

</script>

<!-- Fragment Shader -->
<script id="frag-shader" type="notjs">

precision mediump float;

varying vec4 v_color;

void main()
{
    gl_FragColor = v_color;
}

</script>

</head>

<body>

<canvas id="glcanvas1"
        width="800"
        height="600">
</canvas>

<script type="module" src="main.js"></script>

</body>
</html>
