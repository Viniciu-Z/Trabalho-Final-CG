<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Museu Noturno</title>

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
        }

        #glcanvas1 {
            width: 1080px;
            height: 720px;
            border: 2px solid white;
        }
    </style>

    <script id="vertex-shader" type="notjs">
        attribute vec3 position;
        attribute vec4 color;
        attribute vec2 texCoord;
        attribute vec3 normal;

        uniform mat4 model;
        uniform mat4 view;
        uniform mat4 projection;

        varying vec4 vColor;
        varying vec2 vTexCoord;
        varying vec3 vPosition;
        varying vec3 vNormal;

        void main() {
            vec4 worldPos = model * vec4(position, 1.0);

            vPosition = worldPos.xyz;
            vNormal = normalize(mat3(model) * normal);

            vColor = color;
            vTexCoord = texCoord;

            gl_Position = projection * view * worldPos;
        }
    </script>

    <script id="frag-shader" type="notjs">
        precision mediump float;

        varying vec4 vColor;
        varying vec2 vTexCoord;
        varying vec3 vNormal;
        varying vec3 vPosition;

        uniform sampler2D tex;
        uniform bool usarTextura;
        uniform vec4 objectColor;

        uniform float cutOff;
        uniform float outerCutOff;

        uniform vec3 campos;
        uniform vec3 lightpos;
        uniform vec3 lightDirection;
        uniform vec3 lightColor;
        uniform vec3 ambientColor;

        void main() {

            // Cor base
            vec4 baseColor;

            if (usarTextura) {
                baseColor = texture2D(tex, vTexCoord);
            } else {
                baseColor = vColor * objectColor;
            }

            // Vetores da iluminação
            vec3 N = normalize(vNormal);
            vec3 L = normalize(lightpos - vPosition);
            vec3 V = normalize(campos - vPosition);
            vec3 R = reflect(-L, N);

            // Spotlight
            float theta = dot(normalize(-lightDirection), L);
            float epsilon = cutOff - outerCutOff;
            float intensidade =
                clamp((theta - outerCutOff) / epsilon, 0.0, 1.0);

            // Ambiente
            float Ka = 1.0;
            vec3 ambiente = Ka * ambientColor;

            // Difusa
            float Kd = 0.75;
            float dif = abs(dot(N, L));
            vec3 difusa = Kd * dif * lightColor;

            // Especular
            float Ks = 0.45;
            float brilho = 32.0;

            float esp = 0.0;
            if (dif > 0.0) {
                esp = pow(max(dot(R, V), 0.0), brilho);
            }

            vec3 especular = Ks * esp * lightColor;

            // Resultado final
            vec3 iluminacao =
                ambiente + intensidade * (difusa + especular);

            gl_FragColor =
                vec4(baseColor.rgb * iluminacao, baseColor.a);
        }
    </script>

</head>

<body>

    <!-- ================= Canvas ================= -->
    <canvas
        id="glcanvas1"
        width="1080"
        height="720">
    </canvas>

    <!-- ================= JavaScript ================= -->
    <script type="module" src="main.js"></script>

</body>

</html>
