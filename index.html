<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Passeio Virtual 3D</title>

<!-- Vertex Shader -->
<script id="vertex-shader" type="notjs">

attribute vec3 position;
attribute vec4 color;
attribute vec2 texCoord;

uniform mat4 transf;

varying vec4 vColor;
varying vec2 vTexCoord;

void main()
{
    vColor = color;
    vTexCoord = texCoord;

    gl_Position = transf * vec4(position,1.0);
}

</script>

<!-- Fragment Shader -->
<script id="frag-shader" type="notjs">

uniform sampler2D tex;
uniform bool usarTextura;

varying vec4 vColor;
varying vec2 vTexCoord;

void main()
{
    if (usarTextura)
    {
        gl_FragColor = texture2D(tex, vTexCoord);
    }
    else
    {
        gl_FragColor = vColor;
    }
}

</script>

</head>

<body>

<canvas id="glcanvas1"
        width="800"
        height="600">
</canvas>

<script type="module" src="main.js"></script>

</body>
</html>
